spring:
  application:
    name: fresh-fruit-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    properties:
      hibernate:
        # Batches lazy-loaded associations (product.category, product.images,
        # etc.) into IN-clause queries instead of one query per row, avoiding
        # N+1 query storms on list endpoints like /api/products.
        default_batch_fetch_size: 32

app:
  jwt:
    secret: ${JWT_SECRET:fresh-fruit-dev-secret-key-change-me-in-production-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: ${PORT:8080}
