spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Supabase's Session Pooler caps concurrent connections at 15 total
      # (shared across every client: this app, other backend instances,
      # psql, etc). Keep our pool small enough to leave headroom instead
      # of exhausting the shared limit and causing requests to fail.
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false
